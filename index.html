<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>RA Test - Datos en tiempo real</title>
    <!-- Librerías de AR.js y A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <!-- La cámara que sigue tu ubicación GPS -->
        <a-camera gps-camera rotation-reader></a-camera>

        <!-- Representación de un dato satelital (Punto A) -->
        <!-- REEMPLAZÁ LAS COORDENADAS ABAJO -->
        <a-box
            gps-entity-place="latitude: -34.81296; longitude: -58.44356;"
            scale="10 30 10" 
            material="color: red; opacity: 0.6;">
        </a-box>

    </a-scene>
</body>
</html>
