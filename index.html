<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RA Prueba Final</title>
    <!-- Librerías -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.2/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="dino" src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/examples/image-tracking/nft/trex/scene.gltf"></a-asset-item>
        </a-assets>

        <a-camera 
            gps-camera="simulateAltitude: false; minDistance: 1; maxDistance: 100;" 
            rotation-reader>
        </a-camera>

        <!-- coordenadas  -->
        <a-entity 
            gltf-model="#dino"
            gps-entity-place="latitude: -34.81296; longitude: -58.44356;" 
            scale="0.01 0.01 0.01"
            position= "0 0 0">
        </a-entity>
    </a-scene>

    <script>
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (!document.querySelector('video')) {
                    alert("La cámara no inició. Revisá los permisos de tu navegador.");
                }
            }, 5000);
        });
    </script>
</body>
</html>
