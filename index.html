<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RA Modelo 3D</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <!-- Este es el link al modelo 3D (un Triceratops) -->
            <a-asset-item id="dino" src="https://arjs-resources.pinarkilic.com/assets/triceratops.glb"></a-asset-item>
        </a-assets>

        <a-camera gps-camera rotation-reader></a-camera>

        <!-- IMPORTANTE: Cambiá latitud y longitud por las tuyas para verlo -->
        <a-entity 
            gltf-model="#dino"
            gps-entity-place="latitude: -34.81296; longitude: -58.44356;" 
            scale="0.5 0.5 0.5"
            position="0 0 0">
        </a-entity>

    </a-scene>
</body>
</html>
